version: 1

project:
  title: Machine Learning con Python
  authors:
    - name: Víctor Morales Oñate
  description: Curso de Machine Learning con Python
  github: https://github.com/vmoprojs/MLPython
  bibliography:
    - references.bib
  toc:
    - file: intro.md

    - title: Fundamentos
      children:
        - file: IntroduccionPython.ipynb
        - file: Pandas.ipynb
        - file: Descriptiva.ipynb
        - file: PruebasHipotesis.ipynb

    - title: Machine Learning
      children:
        - file: IntroML.ipynb
        - file: AprendizajeSupervisado.ipynb
        - file: Regresion.ipynb
        - file: StepRegularization.ipynb

    - title: Modelos
      children:
        - file: Arboles.ipynb
        - file: SVM.ipynb
        - file: RedesNeuronales.ipynb

    - title: Evaluación
      children:
        - file: Evaluacion.ipynb

    - title: Modelos Probabilísticos
      children:
        - file: ProbModels.ipynb

    - title: Aprendizaje No Supervisado
      children:
        - file: ACP.ipynb
        - file: NoSupervizado.ipynb

    - title: Reglas de Asociación
      children:
        - file: ReglasAso.ipynb

    - title: Visualización
      children:
        - file: Visualizacion.ipynb
        
    - file: references.md

  settings:
    output_matplotlib_strings: remove
    output_stderr: remove-warn
    parser:
      dollarmath: true

site:
  template: book-theme
  options:
    logo: logo.jpg
    favicon: logo.jpg
    folders: true
    actions:
      - title: Repository
        url: https://github.com/vmoprojs/MLPython
        icon: github
      - title: Issues
        url: https://github.com/vmoprojs/MLPython/issues
        icon: github
      - title: Open in Colab
        url: https://colab.research.google.com/github/vmoprojs/MLPython/blob/main/MLPython/intro.md
        icon: play
      - title: Launch Binder
        url: https://mybinder.org/v2/gh/vmoprojs/MLPython/main?labpath=MLPython
        icon: rocket